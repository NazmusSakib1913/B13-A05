<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans">
    <div id="login-container" class="bg-white p-8 rounded-lg shadow-sm border border-gray-100 w-full max-w-md text-center">
    <img src="assets/github-logo.png" alt="GitHub Logo" class="w-16 h-16 mx-auto mb-4">
        <h1 class="text-xl font-bold text-gray-900 mb-1">GitHub Issues Tracker</h1>
        <p class="text-sm text-gray-500 mb-6">Sign in to manage your issues</p>
        <form id="loginForm" class="text-left">
            <button type="submit" class="w-full bg-[#5C16FF] text-white py-2 rounded-md hover:bg-purple-700 transition">Sign In</button>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" class="w-full px-3 py-2 border border-gray-300 rounded-md" placeholder="Enter Username" required>
                <p class="text-xs text-blue-500 mt-1">Default: admin</p>
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" class="w-full px-3 py-2 border border-gray-300 rounded-md" placeholder="Enter Password" required>
                <p class="text-xs text-blue-500 mt-1">Default: admin123</p>
            </div>
        </form>
        <div class="mt-6 border-t border-gray-100 pt-4 relative">
            <span class="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-white px-2 text-xs text-gray-400">OR</span>
            <div class="bg-gray-50 p-4 rounded-md mt-4 text-sm text-gray-600">
                <p class="mb-1 text-xs text-gray-400">Demo:</p>
                <p><strong>Username:</strong> admin</p>
                <p><strong>Password:</strong> admin123</p>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>

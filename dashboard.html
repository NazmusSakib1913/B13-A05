<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #5C16FF; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#F8F9FA] min-h-screen text-gray-800 font-sans">
    <nav class="bg-white border-b border-gray-200 px-6 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <img src="assets/github-logo.png" alt="Logo" class="w-8 h-8">
            <h1 class="text-lg font-bold">GitHub Issues Tracker</h1>
        </div>
        <div class="flex items-center gap-4">
            <form id="searchForm" class="flex">
                <input type="text" id="searchInput" placeholder="Search issues..." class="border border-gray-300 rounded-l-md px-3 py-1 text-sm">
                <button type="submit" class="bg-gray-100 border border-l-0 border-gray-300 rounded-r-md px-3 py-1 hover:bg-gray-200">🔍</button>
            </form>
            <button id="logoutBtn" class="text-sm text-red-500 hover:underline">Logout</button>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-6 py-8">
        <div class="flex gap-2 mb-6 border-b border-gray-200 pb-4">
            <button class="tab-btn active-tab bg-[#5C16FF] text-white px-6 py-1.5 rounded-md text-sm border" data-status="All">All</button>
            <button class="tab-btn bg-white text-gray-600 px-6 py-1.5 rounded-md text-sm border" data-status="Open">Open</button>
            <button class="tab-btn bg-white text-gray-600 px-6 py-1.5 rounded-md text-sm border" data-status="Closed">Closed</button>
        </div>
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <div class="bg-purple-100 p-2 rounded-full">
                    <img src="assets/Aperture.png" alt="Aperture" class="w-5 h-5">
                </div>
                <div>
                    <h2 class="font-bold text-lg"><span id="issueCount">0</span> Issues</h2>
                    <p class="text-xs text-gray-500">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-4 text-sm font-medium">
                <div class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full bg-green-500"></span> Open</div>
                <div class="flex items-center gap-1"><span class="w-2.5 h-2.5 rounded-full bg-purple-500"></span> Closed</div>
            </div>
            <div id="loader" class="loader hidden"></div>
        <div id="issuesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </div>
    </main>
    <div id="issueModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 w-full max-w-lg shadow-xl relative">
            <button id="closeModal" class="absolute top-4 right-4 text-gray-400 hover:text-gray-800">✖</button>
            <div id="modalContent"></div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
